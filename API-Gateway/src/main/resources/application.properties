server.port=8080

spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true

spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/users/**, /users

spring.cloud.gateway.mvc.routes[1].id=restaurant-service
spring.cloud.gateway.mvc.routes[1].uri=lb://RESTAURANT-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/restaurants/**, /restaurants

spring.cloud.gateway.mvc.routes[2].id=order-service
spring.cloud.gateway.mvc.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/orders/**, /orders

spring.cloud.gateway.mvc.routes[3].id=delivery-service
spring.cloud.gateway.mvc.routes[3].uri=lb://DELIVERY-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/delivery/**, /delivery

spring.cloud.gateway.mvc.routes[4].id=notification-service
spring.cloud.gateway.mvc.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/notifications/**, /notifications

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
